---
# Open ports required by k3s on each node type.
#
# k3s port reference:
#   6443  — API server (all nodes need to reach servers)
#   2379  — etcd client (server-to-server only)
#   2380  — etcd peer  (server-to-server only)
#   8472  — VXLAN (Flannel overlay, all nodes)
#   51820 — WireGuard (if encryption enabled, all nodes)
#   10250 — kubelet metrics (agents → servers)
#   5001  — embedded registry mirror (optional)

- name: Firewall — server nodes
  hosts: k3s_servers
  become: true
  gather_facts: false

  tasks:
    - name: Open API server port (firewalld)
      shell: |
        firewall-cmd --permanent --add-port=6443/tcp
        firewall-cmd --permanent --add-port=2379-2380/tcp
        firewall-cmd --permanent --add-port=8472/udp
        firewall-cmd --permanent --add-port=51820/udp
        firewall-cmd --permanent --add-port=10250/tcp
        firewall-cmd --reload
      when: ansible_os_family == "RedHat"
      ignore_errors: true

    - name: Open API server port (ufw)
      shell: |
        ufw allow 6443/tcp
        ufw allow 2379:2380/tcp
        ufw allow 8472/udp
        ufw allow 51820/udp
        ufw allow 10250/tcp
      when: ansible_os_family == "Debian"
      ignore_errors: true

- name: Firewall — agent nodes
  hosts: k3s_agents
  become: true
  gather_facts: false

  tasks:
    - name: Open agent ports (firewalld)
      shell: |
        firewall-cmd --permanent --add-port=8472/udp
        firewall-cmd --permanent --add-port=51820/udp
        firewall-cmd --permanent --add-port=10250/tcp
        firewall-cmd --reload
      when: ansible_os_family == "RedHat"
      ignore_errors: true

    - name: Open agent ports (ufw)
      shell: |
        ufw allow 8472/udp
        ufw allow 51820/udp
        ufw allow 10250/tcp
      when: ansible_os_family == "Debian"
      ignore_errors: true
