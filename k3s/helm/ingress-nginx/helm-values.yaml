# NGINX Ingress Controller — production values tuned for small hosts.
# Chart: ingress-nginx/ingress-nginx
# Namespace: ingress-nginx

controller:
  # Single replica is acceptable for a small cluster; increase for HA
  replicaCount: 1

  # Use hostNetwork so the controller binds directly to the node's port 80/443
  # without needing a cloud load-balancer or MetalLB.
  hostNetwork: true
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443

  kind: DaemonSet   # run on every node that has the ingress label

  # Only schedule on nodes labelled: ingress=true
  # Label the node: kubectl label node <name> ingress=true
  nodeSelector:
    ingress: "true"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  config:
    # Security headers
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
    ssl-protocols: "TLSv1.2 TLSv1.3"
    ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
    hsts: "true"
    hsts-max-age: "31536000"
    # Tune for small hosts
    worker-processes: "1"
    max-worker-connections: "1024"
    keep-alive: "75"

  ingressClassResource:
    name: nginx
    default: true

  admissionWebhooks:
    resources:
      requests:
        cpu: 10m
        memory: 20Mi
      limits:
        cpu: 100m
        memory: 64Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false   # set true if you have Prometheus Operator installed
