---
# ClusterIssuer for Let's Encrypt HTTP-01 challenge.
# Requires your domain to be publicly reachable on port 80.
# Replace the email address before applying.
#
# Usage:
#   kubectl apply -f letsencrypt-http01.yaml
#
# Then annotate your Ingress:
#   annotations:
#     cert-manager.io/cluster-issuer: letsencrypt-prod

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com   # replace with your email
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

---
# Staging issuer — use this to test without hitting Let's Encrypt rate limits.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@example.com   # replace with your email
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
