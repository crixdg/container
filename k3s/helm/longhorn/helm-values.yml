# Longhorn — production values tuned for small hosts.
# Chart: longhorn/longhorn  version: 1.9.x
# Namespace: storage-controller
#
# After install, Longhorn is available as StorageClass 'longhorn' but is NOT
# set as the cluster default. Run helm/set-default-storageclass.sh when you are
# ready to switch away from local-path.

defaultSettings:
  # 3 replicas across the 3 worker nodes — full redundancy.
  defaultReplicaCount: 3

  # Reserve this fraction of each disk for the OS (0.25 = 25%)
  storageReservedPercentageForDefaultDisk: 25

  # Prevent Longhorn from consuming all CPU on small hosts
  guaranteedInstanceManagerCPU: 12   # 12% of one CPU per instance manager

  # Graceful node drain
  nodeDrainPolicy: block-if-contains-last-replica

  replicaAutoBalance: best-effort

persistence:
  defaultClass: false   # keep local-path as default until you run set-default-storageclass.sh
  defaultClassReplicaCount: 3

longhornUI:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

longhornManager:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

longhornDriver:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: true
  ingressClassName: nginx
  host: longhorn.example.com   # replace with your domain or nip.io address
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: longhorn-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Longhorn — authentication required"
