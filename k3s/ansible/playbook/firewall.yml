---
# Open ports required by k3s on each node type.
#
# k3s port reference:
#   6443  — API server (all nodes need to reach servers)
#   2379  — etcd client (server-to-server only)
#   2380  — etcd peer  (server-to-server only)
#   8472  — VXLAN (Flannel overlay — kept even when Flannel is disabled, harmless)
#   51820 — WireGuard (if encryption enabled, all nodes)
#   10250 — kubelet metrics (agents → servers)
#   5001  — embedded registry mirror (optional)
#   4240  — Cilium health checks (all nodes)
#   4244  — Hubble gRPC (server nodes, for Hubble relay/UI)

- name: Firewall — server nodes
  hosts: k3s_servers
  become: true
  gather_facts: true

  tasks:

    # ── Rocky Linux 10 (firewalld) ───────────────────────────────────────────────
    - name: Ensure firewalld is running (RedHat)
      systemd:
        name: firewalld
        enabled: true
        state: started
      when: ansible_os_family == "RedHat"

    - name: Open server ports (firewalld)
      shell: |
        firewall-cmd --permanent --add-port=6443/tcp
        firewall-cmd --permanent --add-port=2379-2380/tcp
        firewall-cmd --permanent --add-port=8472/udp
        firewall-cmd --permanent --add-port=51820/udp
        firewall-cmd --permanent --add-port=10250/tcp
        firewall-cmd --permanent --add-port=4240/tcp
        firewall-cmd --permanent --add-port=4244/tcp
        firewall-cmd --reload
      when: ansible_os_family == "RedHat"

    # ── Debian 13 (ufw) ─────────────────────────────────────────────────────────
    - name: Install ufw (Debian)
      apt:
        name: ufw
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Allow SSH before enabling ufw (Debian)
      shell: ufw allow 22/tcp
      when: ansible_os_family == "Debian"

    - name: Enable ufw (Debian)
      shell: ufw --force enable
      when: ansible_os_family == "Debian"

    - name: Open server ports (ufw)
      shell: |
        ufw allow 6443/tcp
        ufw allow 2379:2380/tcp
        ufw allow 8472/udp
        ufw allow 51820/udp
        ufw allow 10250/tcp
        ufw allow 4240/tcp
        ufw allow 4244/tcp
      when: ansible_os_family == "Debian"

- name: Firewall — agent nodes
  hosts: k3s_agents
  become: true
  gather_facts: true

  tasks:

    # ── Rocky Linux 10 (firewalld) ───────────────────────────────────────────────
    - name: Ensure firewalld is running (RedHat)
      systemd:
        name: firewalld
        enabled: true
        state: started
      when: ansible_os_family == "RedHat"

    - name: Open agent ports (firewalld)
      shell: |
        firewall-cmd --permanent --add-port=8472/udp
        firewall-cmd --permanent --add-port=51820/udp
        firewall-cmd --permanent --add-port=10250/tcp
        firewall-cmd --permanent --add-port=4240/tcp
        firewall-cmd --reload
      when: ansible_os_family == "RedHat"

    # ── Debian 13 (ufw) ─────────────────────────────────────────────────────────
    - name: Install ufw (Debian)
      apt:
        name: ufw
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Allow SSH before enabling ufw (Debian)
      shell: ufw allow 22/tcp
      when: ansible_os_family == "Debian"

    - name: Enable ufw (Debian)
      shell: ufw --force enable
      when: ansible_os_family == "Debian"

    - name: Open agent ports (ufw)
      shell: |
        ufw allow 8472/udp
        ufw allow 51820/udp
        ufw allow 10250/tcp
        ufw allow 4240/tcp
      when: ansible_os_family == "Debian"
