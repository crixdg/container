---
# Install k3s server nodes.
# The first host in [k3s_servers] bootstraps the cluster with --cluster-init.
# All remaining server hosts join using --server https://<first-server>:6443.
#
# Variables are loaded from ansible/group_vars/all.yml.
# Override any value on the command line with -e VAR=value.

# ------- First server (cluster-init) ------------------------------------------

- name: Bootstrap first k3s server
  hosts: k3s_servers[0]
  become: true
  gather_facts: false

  tasks:

    - name: Create rancher config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Create audit log directory
      file:
        path: "{{ DATA_DIR }}/server/logs"
        state: directory
        mode: '0700'

    - name: Write k3s config file
      copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: '0600'
        content: |
          cluster-init: true
          node-ip: "{{ ansible_host }}"
          cluster-cidr: "{{ CLUSTER_CIDR }}"
          service-cidr: "{{ SERVICE_CIDR }}"
          data-dir: "{{ DATA_DIR }}"

          tls-san:
            - "{{ ansible_host }}"
            {% if EXTRA_SANS %}
            {% for san in EXTRA_SANS.split(',') %}
            - "{{ san | trim }}"
            {% endfor %}
            {% endif %}

          # Cilium replaces Flannel as the CNI.
          flannel-backend: none
          disable-network-policy: true

          disable:
            - traefik
            - servicelb
            {% if DISABLE_LOCAL_STORAGE == 'true' %}
            - local-storage
            {% endif %}

          secrets-encryption: {{ SECRETS_ENCRYPTION | lower }}

          etcd-snapshot-schedule-cron: "{{ ETCD_SNAPSHOT_SCHEDULE_CRON }}"
          etcd-snapshot-retention: {{ ETCD_SNAPSHOT_RETENTION }}
          etcd-expose-metrics: true

          kube-apiserver-arg:
            - "audit-log-path={{ DATA_DIR }}/server/logs/audit.log"
            - "audit-log-maxage=7"
            - "audit-log-maxbackup=3"
            - "audit-log-maxsize=100"

          # Explicit empty taint list — control-plane nodes are schedulable.
          node-taint: []

          kubelet-arg:
            - "eviction-hard=memory.available<{{ EVICTION_HARD_MEMORY }}"
            - "eviction-soft=memory.available<{{ EVICTION_SOFT_MEMORY }}"
            - "eviction-soft-grace-period=memory.available={{ EVICTION_SOFT_GRACE }}"
            - "max-pods=110"

    - name: Install k3s (first server)
      environment:
        INSTALL_K3S_VERSION: "{{ K3S_VERSION }}"
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for node to become Ready
      shell: |
        kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get node \
          -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      retries: 30
      delay: 5
      until: node_ready.stdout == "True"
      changed_when: false

    - name: Remove control-plane taint (ensure schedulable)
      shell: |
        kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml \
          taint nodes {{ inventory_hostname }} \
          node-role.kubernetes.io/control-plane:NoSchedule- \
          --ignore-not-found
      changed_when: false

    - name: Fetch node-token
      slurp:
        src: "{{ DATA_DIR }}/server/node-token"
      register: node_token_b64

    - name: Share token with other plays
      add_host:
        name: k3s_token_holder
        node_token: "{{ node_token_b64.content | b64decode | trim }}"

    - name: Print cluster info
      debug:
        msg:
          - "First server is Ready."
          - "Join URL : https://{{ ansible_host }}:6443"
          - "Token    : {{ node_token_b64.content | b64decode | trim }}"

# ------- Additional server nodes ----------------------------------------------

- name: Join additional k3s servers
  hosts: k3s_servers[1:]
  become: true
  gather_facts: false
  serial: 1   # join one at a time to keep etcd quorum stable

  tasks:

    - name: Create rancher config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Write k3s config file (additional server)
      copy:
        dest: /etc/rancher/k3s/config.yaml
        mode: '0600'
        content: |
          server: "https://{{ FIRST_SERVER_IP }}:6443"
          token: "{{ hostvars['k3s_token_holder']['node_token'] }}"
          node-ip: "{{ ansible_host }}"
          cluster-cidr: "{{ CLUSTER_CIDR }}"
          service-cidr: "{{ SERVICE_CIDR }}"
          data-dir: "{{ DATA_DIR }}"

          tls-san:
            - "{{ FIRST_SERVER_IP }}"
            {% if EXTRA_SANS %}
            {% for san in EXTRA_SANS.split(',') %}
            - "{{ san | trim }}"
            {% endfor %}
            {% endif %}

          # Cilium replaces Flannel as the CNI.
          flannel-backend: none
          disable-network-policy: true

          disable:
            - traefik
            - servicelb
            {% if DISABLE_LOCAL_STORAGE == 'true' %}
            - local-storage
            {% endif %}

          etcd-expose-metrics: true

          # Explicit empty taint list — control-plane nodes are schedulable.
          node-taint: []

          kubelet-arg:
            - "eviction-hard=memory.available<{{ EVICTION_HARD_MEMORY }}"
            - "eviction-soft=memory.available<{{ EVICTION_SOFT_MEMORY }}"
            - "eviction-soft-grace-period=memory.available={{ EVICTION_SOFT_GRACE }}"
            - "max-pods=110"

    - name: Install k3s (additional server)
      environment:
        INSTALL_K3S_VERSION: "{{ K3S_VERSION }}"
      shell: curl -sfL https://get.k3s.io | sh -s - server
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for this node to be Ready
      shell: |
        kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes \
          --field-selector metadata.name={{ inventory_hostname }} \
          -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      retries: 30
      delay: 5
      until: node_ready.stdout == "True"
      changed_when: false
      delegate_to: "{{ groups['k3s_servers'][0] }}"

    - name: Remove control-plane taint (ensure schedulable)
      shell: |
        kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml \
          taint nodes {{ inventory_hostname }} \
          node-role.kubernetes.io/control-plane:NoSchedule- \
          --ignore-not-found
      changed_when: false
      delegate_to: "{{ groups['k3s_servers'][0] }}"
