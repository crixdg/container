# k3s cluster inventory
# Replace IPs and usernames with your actual values.
# For a single-node setup, put the same IP in [k3s_servers] and leave [k3s_agents] empty.

[k3s_servers]
# First server — bootstraps the cluster (cluster-init).
# Must be listed first in this group.
server-01 ansible_host=192.168.1.100 ansible_user=root

# Additional server nodes (HA — requires 3+ servers for etcd quorum).
# Comment these out for a single-node setup.
# server-02 ansible_host=192.168.1.101 ansible_user=root
# server-03 ansible_host=192.168.1.102 ansible_user=root

[k3s_agents]
# Worker-only nodes. Leave empty for a single-node setup.
# agent-01 ansible_host=192.168.1.110 ansible_user=root
# agent-02 ansible_host=192.168.1.111 ansible_user=root

[k3s_cluster:children]
k3s_servers
k3s_agents
