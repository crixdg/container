# k3s private registry configuration
# Place this file at /etc/rancher/k3s/registries.yaml before running install-server.sh.
# k3s reads it automatically on startup; restart k3s after any changes.
#
# Reference: https://docs.k3s.io/installation/private-registry

mirrors:
  # Pull from an internal Nexus proxy instead of docker.io
  # docker.io:
  #   endpoint:
  #     - "https://nexus.example.com/repository/docker-proxy"

  # Pull from a private registry directly
  # registry.example.com:
  #   endpoint:
  #     - "https://registry.example.com"

configs:
  # Credentials for a private registry (only needed if it requires auth)
  # registry.example.com:
  #   auth:
  #     username: myuser
  #     password: mypassword
  #   tls:
  #     insecure_skip_verify: false
