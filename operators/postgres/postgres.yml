# CloudNativePG single-instance Cluster CR (dev)
# Applied with: kubectl apply -f postgres.yml -n postgres
#
# 1 instance = primary only, no standbys. For HA (1 primary + 2 standbys), use postgres-ha.yml.
#
# Requires:
#   - cnpg operator installed in cnpg-system namespace
#   - Secret "postgres-app-password" with key "password" in the postgres namespace

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: postgres
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  bootstrap:
    initdb:
      database: postgres
      owner: pg-admin
      secret:
        name: postgres-app-password

  storage:
    storageClass: longhorn
    size: 10Gi

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

  managed:
    roles:
      - name: pg-admin
        superuser: true
        login: true
        passwordSecret:
          name: postgres-app-password

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"
      wal_level: logical

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-external
  namespace: postgres
spec:
  type: NodePort
  selector:
    cnpg.io/cluster: postgres
    cnpg.io/instanceRole: primary
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
      protocol: TCP
