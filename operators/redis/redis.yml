# Redis standalone CR — single-node, no replication
# Applied with: kubectl apply -f redis.yml -n redis
#
# Use this for dev / single-node environments.
# For HA (1 master + 2 replicas), use redis-replication.yml instead.
#
# Requires: redis-operator installed in redis-operator namespace

apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: redis
data:
  redis-additional.conf: |
    maxmemory 400mb # keeps usage below the 512Mi limit
    maxmemory-policy allkeys-lru # evicts least-recently-used keys when full
    appendonly no # disables AOF (storage-backed persistence is handled by the PVC)
    tcp-keepalive 60 # keep-alive for TCP connections for 1 minute
    timeout 300 # close idle connections after 5 minutes

---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: redis
  namespace: redis
spec:
  kubernetesConfig:
    image: quay.io/opstree/redis:v8.6.1
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    # Uncomment to enable password auth (create secret first — see install.sh)
    # redisSecret:
    #   name: redis-secret
    #   key: password

  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi

  redisConfig:
    additionalRedisConfig: redis-config

  redisExporter:
    enabled: false  # set true when kube-prometheus-stack is installed
    image: quay.io/opstree/redis-exporter:v1.83.0
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5

  readinessProbe:
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
