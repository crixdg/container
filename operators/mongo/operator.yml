# MongoDB Community Kubernetes Operator Helm values
# Chart: mongodb/community-operator
# Install: helm upgrade --install mongodb-community-operator mongodb/community-operator \
#            -f operator.yml -n mongodb-operator --create-namespace
#
# watchNamespace limits the operator to reconcile CRs only in the listed namespace.
# Set to "" to watch cluster-wide.

operator:
  watchNamespace: "mongodb"
  # createOperatorServiceAccount required when operator namespace != watch namespace
  # so the chart creates the mongodb-database SA + RBAC in the watched namespace
  createOperatorServiceAccount: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Community operator manages its own MongoDBCommunity CRDs — no separate CRD install needed
