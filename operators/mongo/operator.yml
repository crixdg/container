# MongoDB Community Kubernetes Operator Helm values
# Chart: mongodb/community-operator
# Install: helm upgrade --install mongodb-community-operator mongodb/community-operator \
#            -f operator.yml -n mongodb --create-namespace
#
# Operator and MongoDB workloads share the same namespace (mongodb) so the chart
# creates the mongodb-database SA + RBAC in the correct namespace automatically.

operator:
  watchNamespace: "mongodb"
  createOperatorServiceAccount: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Community operator manages its own MongoDBCommunity CRDs — no separate CRD install needed
