# Strimzi Kafka Operator — Helm values
# Chart: strimzi/strimzi-kafka-operator
#
# Install:
#   helm repo add strimzi https://strimzi.io/charts
#   helm upgrade --install strimzi-kafka-operator strimzi/strimzi-kafka-operator \
#     -f operator.yml -n kafka-operator --create-namespace

resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 1000m
    memory: 384Mi

# Watch only the kafka namespace. Set watchAnyNamespace: true to manage cluster-wide.
watchNamespaces:
  - kafka

logLevel: INFO
