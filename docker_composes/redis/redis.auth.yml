services:
  redis:
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec redis-server \
          --user "${REDIS_USER} on >${REDIS_PASSWORD} ~* &* +@all" \
          --user "default off"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -u "redis://${REDIS_USER}:${REDIS_PASSWORD}@localhost:6379" ping
