services:
  akhq:
    image: tchiotludo/akhq:${AKHQ_VERSION}
    container_name: akhq
    ports:
      - "8080:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            local:
              properties:
                bootstrap.servers: "kafka:9093"
    networks:
      - kafka_net

networks:
  kafka_net:
    external: true
