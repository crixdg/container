services:
  console:
    image: redpandadata/console:${CONSOLE_VERSION}
    container_name: redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: "redpanda:9093"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - redpanda_net

networks:
  redpanda_net:
    external: true
