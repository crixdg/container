# CloudNativePG Operator — default values reference
# Source: https://cloudnative-pg.github.io/charts

# The operator runs cluster-wide by default (watchNamespaces: [])
# To restrict it to specific namespaces, set:
# watchNamespaces:
#   - postgres

replicaCount: 1   # increase to 3 for HA operator itself

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 500m
    memory: 500Mi

monitoring:
  podMonitorEnabled: false   # set true if using Prometheus Operator / kube-prometheus-stack
  grafanaDashboard:
    create: false            # set true to auto-create Grafana ConfigMap dashboard
