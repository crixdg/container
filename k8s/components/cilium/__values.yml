# ! Required for kubeProxyReplacement=true so Cilium can reach the API server directly without kube-proxy
k8sServiceHost: ${API_SERVER_IP}

# ! Must match the API server port (default 6443 for k3s/kubeadm); paired with k8sServiceHost above
k8sServicePort: ${API_SERVER_PORT}

cluster:
  # ! Unique name per cluster; required for correct identity scoping in clustermesh and for distinguishing
  # ! metrics/logs when multiple clusters share the same Prometheus or Hubble relay
  name: ${CLUSTER_NAME}

# # ! Replaces kube-proxy entirely with eBPF; safe only when kube-proxy is not running on the nodes
# kubeProxyReplacement: "true"

# socketLB:
#   # ! Enables socket-level load balancing via eBPF; required for kubeProxyReplacement to intercept traffic at the socket layer
#   enabled: true

# cgroup:
#   # ! Host already mounts cgroupv2 at /sys/fs/cgroup; disabling autoMount prevents Cilium from creating an isolated
#   # ! fresh cgroup2 mount (which would cause socketLB BPF programs to attach to the wrong hierarchy and never fire)
#   autoMount:
#     enabled: false
#   hostRoot: /sys/fs/cgroup

# ! Ensures agents pick up config changes (e.g. policy updates) without manual restarts
rollOutCiliumPods: true

# ! Prevents the agent from being OOM-killed under load; requests ensure it is scheduled on nodes with enough headroom
resources:
  requests:
    cpu: 100m
    memory: 512Mi

hubble:
  metrics:
    # ! Core metrics for observability: DNS queries, dropped packets, L4 (tcp/icmp) and L7 (http) flows
    enabled:
      - dns:query;ignoreAAAA
      - drop
      - tcp
      - flow
      - icmp
      - http
    # ! Required for Prometheus scraping via OpenMetrics standard instead of legacy format
    enableOpenMetrics: true
  relay:
    # ! Exposes the Hubble gRPC API cluster-wide so hubble-ui and CLI can query flows from any node
    enabled: true
    # ! Keeps relay in sync with config changes without manual restarts
    rollOutPods: true
  ui:
    # ! Provides a web dashboard for visualizing network flows and policy verdicts
    enabled: true
    # ! Keeps ui in sync with config changes without manual restarts
    rollOutPods: true
    ingress:
      # ! Exposes Hubble UI via nginx ingress; nip.io gives a resolvable hostname without a real DNS record
      enabled: true
      className: nginx
      hosts:
        - ${HUBBLE_UI_HOST}

ipam:
  operator:
    # ! Must match the pod CIDR configured in the cluster (k3s --cluster-cidr or kubeadm podSubnet)
    clusterPoolIPv4PodCIDRList: ["${POD_NETWORK_CIDR}"]

# ! Exposes /metrics on port 9962 for Prometheus scraping of Cilium agent
prometheus:
  metricsService: true
  enabled: true

# ! Enables Grafana sidecar auto-discovery; label changed from grafana_dashboard to cilium_grafana_dashboard to avoid conflicts with other chart dashboards
dashboards:
  enabled: true
  label: cilium_grafana_dashboard

envoy:
  # ! Disabled — we do not use L7 load balancing or CiliumEnvoyConfig; saves a DaemonSet per node
  enabled: false

operator:
  # ! Keeps operator in sync with config changes (IPAM, node management) without manual restarts
  rollOutPods: true
