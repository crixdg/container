# helm_charts/kafka/akhq/values.yaml
namespace: kafka
replicas: 1

image:
  repository: tchiotludo/akhq
  # Bump to the latest stable tag as needed: https://github.com/tchiotludo/akhq/releases
  tag: "0.27.1"
  pullPolicy: IfNotPresent

# Liveness/readiness HTTP path. AKHQ (through 0.27.1) has no /health endpoint (404),
# so we probe "/" which 307-redirects to /ui (probes treat 2xx/3xx as healthy).
probePath: /

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  # ClusterIP for in-cluster access; set NodePort + nodePort to expose externally (dev).
  type: ClusterIP
  port: 8080
  nodePort: ""   # e.g. 32100 when type is NodePort

# L7 access via the k3s-default Traefik ingress controller.
# nip.io is wildcard DNS: <anything>.<ip>.nip.io resolves to <ip>, so no real
# DNS records are needed. Point host at the IP that fronts Traefik:
#   - single node / ServiceLB:  the node's IP        -> akhq.192.168.1.10.nip.io
#   - Traefik LoadBalancer svc:  its EXTERNAL-IP      (kubectl get svc -n kube-system traefik)
ingress:
  enabled: false
  className: traefik   # matches `kubectl get ingressclass` on stock k3s
  host: ""             # e.g. akhq.192.168.1.10.nip.io
  path: /
  pathType: Prefix
  annotations: {}

# Rendered verbatim into /app/application.yml under the top-level "akhq:" key.
#
# Targets the Strimzi cluster from operators/kafka/ (cluster name "kafka",
# namespace "kafka"). Both kafka.yml (dev) and kafka-production.yml expose an
# internal plaintext listener on 9092, so this same connection works against
# whichever one is applied. Strimzi names the bootstrap service
# "<cluster>-kafka-bootstrap" -> kafka-kafka-bootstrap.
akhq:
  connections:
    kafka:
      properties:
        bootstrap.servers: "kafka-kafka-bootstrap.kafka.svc:9092"

  # --- Production via the authenticated path (SASL_SSL + SCRAM-SHA-512) ---
  # In-cluster you normally use the plaintext internal listener above. To instead
  # go through kafka-production.yml's authenticated external listener (the
  # app-client KafkaUser), add a connection like:
  #
  #   kafka-prod:
  #     properties:
  #       bootstrap.servers: "kafka-kafka-bootstrap.kafka:9093"
  #       security.protocol: SASL_SSL
  #       sasl.mechanism: SCRAM-SHA-512
  #       sasl.jaas.config: >-
  #         org.apache.kafka.common.security.scram.ScramLoginModule required
  #         username="app-client" password="${SASL_PASSWORD}";
  #       ssl.truststore.location: /etc/kafka/certs/ca.p12
  #       ssl.truststore.password: "${TRUSTSTORE_PASSWORD}"
  #       ssl.truststore.type: PKCS12
  #
  # Then mount the app-client and kafka-cluster-ca-cert secrets via extraEnv/extraVolumes
  # (the app-client password lives in secret "app-client", CA in "kafka-cluster-ca-cert").

# Extra env vars (e.g. SASL_PASSWORD from a secret) appended to the container.
extraEnv: []
#  - name: SASL_PASSWORD
#    valueFrom:
#      secretKeyRef:
#        name: app-client
#        key: password

# Extra volumes / mounts (e.g. the cluster CA truststore).
extraVolumes: []
extraVolumeMounts: []
