# helm_charts/kafka/akhq/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: akhq
  namespace: {{ .Values.namespace }}
  labels:
    app: akhq
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: akhq
  template:
    metadata:
      labels:
        app: akhq
      annotations:
        # Roll the pods when the rendered config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: akhq
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MICRONAUT_CONFIG_FILES
              value: /app/application.yml
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          # AKHQ (through 0.27.1) does NOT expose /health on the HTTP port (404);
          # "/" 307-redirects to the UI, which probes accept as success (2xx/3xx).
          # Override via .Values.probePath if a build exposes a real health endpoint.
          readinessProbe:
            httpGet:
              path: {{ .Values.probePath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.probePath }}
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/application.yml
              subPath: application.yml
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: akhq-config
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
