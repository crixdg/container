# CloudNativePG — minimal single-node reference
# This is the baseline used before scaling to HA.
# Keep this file as documentation of what changed when going to instances: 3.

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: postgres
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:16.4

  primaryUpdateStrategy: unsupervised

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: postgres-app-secret

  storage:
    storageClass: longhorn
    size: 20Gi

  resources:
    requests:
      cpu: "500m"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
