services:
  nifi:
    image: ${REGISTRY:-}apache/nifi:${NIFI_VERSION:-1.27.0}
    container_name: nifi
    restart: unless-stopped
    ports:
      - "${NIFI_PORT:-8080}:8080"
    environment:
      NIFI_WEB_HTTP_PORT: "8080"
    volumes:
      - nifi-data:/opt/nifi/nifi-current/data
      - nifi-conf:/opt/nifi/nifi-current/conf
    networks:
      - nifi-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        max_failure_ratio: 0.25
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        max_failure_ratio: 0.25
        order: start-first

volumes:
  nifi-data:
    name: nifi-data
    driver: local
  nifi-conf:
    name: nifi-conf
    driver: local

networks:
  nifi-network:
    name: nifi-network
    driver: bridge
