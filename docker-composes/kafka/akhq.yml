services:
  akhq:
    image: ${REGISTRY:-}tchiotludo/akhq:${AKHQ_VERSION:-0.25.1}
    container_name: kafka-akhq
    restart: unless-stopped
    ports:
      - "${AKHQ_PORT:-8080}:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            kafka-server:
              properties:
                bootstrap.servers: "kafka-broker:9092"
    networks:
      - kafka-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        max_failure_ratio: 0.25
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        max_failure_ratio: 0.25
        order: start-first

networks:
  kafka-network:
    name: kafka-network
    external: true
