services:
  redis:
    image: ${REGISTRY:-}redis:${REDIS_VERSION:-8.6}
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      [
        "redis-server",
        "--maxmemory",
        "${REDIS_MAXMEMORY:-4gb}",
        "--maxmemory-policy",
        "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}",
        "--save",
        "",
        "--loglevel",
        "notice",
      ]
    volumes:
      - redis-data:/data
    networks:
      - redis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 4G
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        max_failure_ratio: 0.25
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        max_failure_ratio: 0.25
        order: start-first

volumes:
  redis-data:
    name: redis-data
    driver: local

networks:
  redis-network:
    name: redis-network
    driver: bridge
